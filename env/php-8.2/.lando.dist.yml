name: gettext-context-php-8.2
services:
  appserver:
    type: php:8.2
    via: cli
    app_mount: delegated
    overrides:
      image: slimdeluxe/php:8.2-v1.4
      volumes:
        # Mount the project root directory to /app
        - "../..:/app"
        # Prevent the source vendor directory to be mounted
        - /app/vendor
        # Make available the source composer.json to be used by the merged one
        - "../../composer.json:/usr/local/src/composer.json"
        # Use the merged composer.json instead of the source one
        - "./composer.json:/app/composer.json"
tooling:
  php:
    service: appserver
  composer:
    service: appserver
  test:
    service: appserver
    description: Run tests
    # For some reason, "composer test" does not work for this package, so we use a custom shell script
    cmd: "./tests.sh"
